<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memento Mori</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* ── 語言切換 / Language toggle ── */
    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      z-index: 100;
    }
    .lang-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .lang-btn + .lang-btn { border-left: 1px solid #2a2a2a; }
    .lang-btn.active { background: #1e1e1e; color: #c8a96e; }
    .lang-btn:hover:not(.active) { color: #888; }

    /* ── 中間畫面 (驗證 / 設定) / Center screens ── */
    .center-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
      max-width: 440px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .subtitle {
      color: #777;
      font-size: 0.82rem;
      text-align: center;
      line-height: 1.7;
    }

    .form-group { width: 100%; display: flex; flex-direction: column; gap: 7px; }

    .form-label {
      font-size: 0.7rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    input[type="password"],
    input[type="date"] {
      background: #181818;
      border: 1px solid #2e2e2e;
      color: #e8e8e8;
      padding: 11px 14px;
      font-size: 0.95rem;
      border-radius: 4px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #555; }

    input[type="range"] { width: 100%; accent-color: #e8e8e8; cursor: pointer; }

    .range-val {
      text-align: center;
      font-size: 2rem;
      font-weight: 200;
      color: #ccc;
    }

    .btn {
      background: #e8e8e8;
      color: #0d0d0d;
      border: none;
      padding: 11px 28px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
      width: 100%;
    }
    .btn:hover { background: #fff; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-ghost {
      background: transparent;
      color: #777;
      border: 1px solid #2a2a2a;
      padding: 10px 28px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: #aaa; border-color: #444; }

    .err { color: #c0504d; font-size: 0.78rem; text-align: center; min-height: 1em; }

    a { color: #777; font-size: 0.78rem; }
    a:hover { color: #999; }

    /* ── 主畫面 / Main screen ── */
    .main-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .top-logo {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }

    .top-right { display: flex; align-items: center; gap: 14px; }

    .home-link {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      text-decoration: none;
      transition: color 0.2s;
    }
    .home-link:hover { color: #c8a96e; }

    .sync-badge {
      font-size: 0.7rem;
      color: #3a3a3a;
      letter-spacing: 0.04em;
    }
    .sync-badge.ok  { color: #3d6b3d; }
    .sync-badge.err { color: #6b3d3d; }

    .icon-btn {
      background: none;
      border: none;
      color: #3a3a3a;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .icon-btn:hover { color: #888; }

    /* ── 生命時鐘 / Life clock ── */
    .life-clock { display: flex; justify-content: center; margin-bottom: 36px; }

    /* ── 倒數計時 / Countdown ── */
    .countdown {
      display: flex;
      gap: 0;
      justify-content: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .cd-unit { text-align: center; padding: 0 24px; }
    .cd-unit + .cd-unit { border-left: 1px solid #1e1e1e; }

    .cd-val {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cd-label {
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 8px;
    }

    /* ── 區塊標題 / Section label ── */
    .section-label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 14px;
    }

    .grid-scroll { overflow-x: auto; margin: 0 -24px; padding: 0 24px; }
    .life-grid { display: inline-flex; flex-direction: column; gap: 2px; }
    .grid-row  { display: flex; align-items: center; gap: 2px; }

    .yr-lbl {
      font-size: 8px;
      color: #2e2e2e;
      width: 22px;
      text-align: right;
      padding-right: 5px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .wk { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
    .wk.past   { background: #3a3a3a; }
    .wk.now    { background: #c8a96e; }
    .wk.future { background: transparent; border: 1px solid #1e1e1e; }

    /* ── 統計卡片 / Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 40px;
    }

    .stat {
      background: #141414;
      border: 1px solid #1e1e1e;
      padding: 18px 16px;
      border-radius: 4px;
    }

    .stat-val { font-size: 1.4rem; font-weight: 200; font-variant-numeric: tabular-nums; }

    .stat-lbl {
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 5px;
    }

    /* ── 每日名言 / Daily quote ── */
    .quote-card {
      border-left: 2px solid #c8a96e;
      padding: 14px 20px;
      margin-bottom: 36px;
      background: #111;
      border-radius: 0 4px 4px 0;
    }
    .quote-text   { font-size: 0.88rem; color: #aaa; font-style: italic; line-height: 1.7; margin-bottom: 7px; }
    .quote-author { font-size: 0.65rem; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── 自由時間 / Free time ── */
    .ft-section { margin-top: 40px; }
    .ft-controls { display: flex; gap: 20px; flex-wrap: wrap; margin: 16px 0; }
    .ft-control  { display: flex; flex-direction: column; gap: 6px; }
    .ft-control label {
      font-size: 0.62rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .ft-control input[type="number"] {
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      padding: 7px 10px;
      font-size: 0.85rem;
      border-radius: 4px;
      width: 88px;
      outline: none;
      transition: border-color 0.15s;
    }
    .ft-control input[type="number"]:focus { border-color: #555; }
  </style>
</head>
<body>

<!-- ── 語言切換按鈕 / Language toggle (fixed, always visible) ── -->
<div class="lang-toggle">
  <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn"        id="lang-zh" onclick="setLang('zh')">中文</button>
</div>

<!-- ── 驗證畫面 / AUTH ── -->
<div id="s-auth" class="center-screen">
  <div class="logo">Memento Mori</div>
  <p class="subtitle" data-i18n="authSubtitle"></p>

  <div class="form-group">
    <label class="form-label" for="pat" data-i18n="patLabel"></label>
    <input type="password" id="pat" placeholder="ghp_…" autocomplete="off" spellcheck="false">
  </div>

  <p class="subtitle">
    <!-- "Needs gist scope" note rendered by applyLang() -->
    <span id="auth-scope-note"></span>
  </p>

  <button class="btn"       id="connect-btn" data-i18n="connectBtn"></button>
  <div class="err"          id="auth-err"></div>
  <button class="btn-ghost" id="skip-btn"    data-i18n="skipBtn"></button>
</div>

<!-- ── 設定畫面 / SETUP ── -->
<div id="s-setup" class="center-screen hidden">
  <div class="logo" data-i18n="setupTitle"></div>
  <p class="subtitle" data-i18n="setupSubtitle"></p>

  <div class="form-group">
    <label class="form-label" for="bday" data-i18n="bdayLabel"></label>
    <input type="date" id="bday">
  </div>

  <div class="form-group">
    <label class="form-label" data-i18n="lifespanLabel"></label>
    <div class="range-val"><span id="ls-display">80</span> <span data-i18n="lifespanUnit"></span></div>
    <input type="range" id="ls" min="60" max="100" value="80">
  </div>

  <button class="btn" id="start-btn" data-i18n="beginBtn"></button>
  <div class="err"    id="setup-err"></div>
</div>

<!-- ── 主畫面 / MAIN ── -->
<div id="s-main" class="hidden">
  <div class="main-wrap">

    <div class="top-bar">
      <a class="home-link" href="https://rogerccy.github.io" id="home-link-text">&#8592; Home</a>
      <span class="top-logo">Memento Mori</span>
      <div class="top-right">
        <span class="sync-badge" id="sync-badge"></span>
        <button class="icon-btn" id="settings-btn" title="Edit settings">⚙</button>
      </div>
    </div>

    <!-- 每日名言 / Daily quote -->
    <div id="daily-quote" class="quote-card"></div>

    <!-- 生命時鐘 / Life clock -->
    <div class="life-clock" id="life-clock"></div>

    <!-- 倒數計時 / Countdown -->
    <div class="countdown" id="countdown"></div>

    <!-- 人生週曆 / Life-in-weeks grid -->
    <div class="section-label" id="grid-label"></div>
    <div class="grid-scroll">
      <div class="life-grid" id="life-grid"></div>
    </div>

    <!-- 統計卡片 / Stats -->
    <div class="stats" id="stats"></div>

    <!-- 自由時間 / Free time -->
    <div class="ft-section">
      <div class="section-label" data-i18n="ftSection"></div>
      <div class="ft-controls">
        <div class="ft-control">
          <label for="ft-sleep" data-i18n="ftSleep"></label>
          <input type="number" id="ft-sleep" min="4" max="12" value="8">
        </div>
        <div class="ft-control">
          <label for="ft-work" data-i18n="ftWork"></label>
          <input type="number" id="ft-work" min="0" max="16" value="8">
        </div>
        <div class="ft-control">
          <label for="ft-wdays" data-i18n="ftWdays"></label>
          <input type="number" id="ft-wdays" min="0" max="7" value="5">
        </div>
        <div class="ft-control">
          <label for="ft-retire" data-i18n="ftRetire"></label>
          <input type="number" id="ft-retire" min="40" max="90" value="65">
        </div>
      </div>
      <div class="stats" id="ft-stats"></div>
    </div>

  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  // ────────────────────────────────────────────────
  // 多語言翻譯 / Translations
  // ────────────────────────────────────────────────
  const LANG = {
    en: {
      // 驗證畫面 / Auth screen
      authSubtitle:   'Remember you will die — and live accordingly.\nConnect GitHub to save & sync your settings.',
      patLabel:       'GitHub Personal Access Token',
      authScopeNote:  'Needs <strong style="color:#777">gist</strong> scope only — <a href="https://github.com/settings/tokens/new?scopes=gist&description=memento-mori" target="_blank" rel="noopener">create classic token →</a>',
      connectBtn:     'Connect',
      skipBtn:        'Skip — local only',
      connectingBtn:  'Connecting…',
      invalidToken:   'Invalid token — check scopes and try again.',
      // 設定畫面 / Setup screen
      setupTitle:     'Your Life',
      setupSubtitle:  'Set your details once. Change them anytime.',
      bdayLabel:      'Date of Birth',
      lifespanLabel:  'Expected Lifespan',
      lifespanUnit:   'years',
      beginBtn:       'Begin',
      bdayRequired:   'Please enter your date of birth.',
      // 主畫面頂部 / Main top bar
      homeLink:       '← Home',
      // 時鐘 / Clock
      yearsOld:       'YEARS OLD',
      pctLived:       '% lived',
      // 倒數計時 / Countdown
      cdYears:  'Years',
      cdMonths: 'Months',
      cdWeeks:  'Weeks',
      cdDays:   'Days',
      giftMsg:  'Every day beyond your estimate is a gift.',
      // 網格 / Grid
      gridLabel: 'Life in Weeks — each box is one week',
      // 統計 / Stats
      statLifeLived: 'Life Lived',
      statSummers:   'Summers Left',
      statWeekends:  'Weekends Left',
      statMoons:     'Full Moons Left',
      statDays:      'Days Remaining',
      statHours:     'Hours Remaining',
      // 自由時間 / Free time
      ftSection:      'Free Time Remaining',
      ftSleep:        'Sleep hrs/day',
      ftWork:         'Work hrs/day',
      ftWdays:        'Work days/week',
      ftRetire:       'Retire age',
      ftFreeHours:    'Free Hours Left',
      ftFreeYears:    'Free Years Left',
      ftFreePct:      'Of Remaining Life',
      ftFreeWeekends: 'Free Weekends Left',
      // 同步狀態 / Sync
      syncing:    'syncing…',
      synced:     'synced ✓',
      syncFailed: 'sync failed',
    },
    zh: {
      // 驗證畫面
      authSubtitle:   '記住你終將死去——並以此為生。\n連結 GitHub 以儲存並同步你的設定。',
      patLabel:       'GitHub 個人存取權杖',
      authScopeNote:  '僅需 <strong style="color:#777">gist</strong> 權限 — <a href="https://github.com/settings/tokens/new?scopes=gist&description=memento-mori" target="_blank" rel="noopener">建立 classic token →</a>',
      connectBtn:     '連結',
      skipBtn:        '略過——僅本地儲存',
      connectingBtn:  '連結中…',
      invalidToken:   '權杖無效——請確認權限後重試。',
      // 設定畫面
      setupTitle:     '你的人生',
      setupSubtitle:  '設定一次，隨時可更改。',
      bdayLabel:      '出生日期',
      lifespanLabel:  '預期壽命',
      lifespanUnit:   '歲',
      beginBtn:       '開始',
      bdayRequired:   '請輸入你的出生日期。',
      // 主畫面頂部
      homeLink:       '← 首頁',
      // 時鐘
      yearsOld:       '歲',
      pctLived:       '% 已過',
      // 倒數計時
      cdYears:  '年',
      cdMonths: '月',
      cdWeeks:  '週',
      cdDays:   '天',
      giftMsg:  '每一個超過預期的日子，都是禮物。',
      // 網格
      gridLabel: '人生週曆——每格代表一週',
      // 統計
      statLifeLived: '已過人生',
      statSummers:   '剩餘夏天',
      statWeekends:  '剩餘週末',
      statMoons:     '剩餘滿月',
      statDays:      '剩餘天數',
      statHours:     '剩餘小時',
      // 自由時間
      ftSection:      '自由時間剩餘',
      ftSleep:        '睡眠時數／天',
      ftWork:         '工作時數／天',
      ftWdays:        '工作天數／週',
      ftRetire:       '退休年齡',
      ftFreeHours:    '剩餘自由時數',
      ftFreeYears:    '剩餘自由年數',
      ftFreePct:      '佔剩餘人生',
      ftFreeWeekends: '剩餘自由週末',
      // 同步狀態
      syncing:    '同步中…',
      synced:     '已同步 ✓',
      syncFailed: '同步失敗',
    }
  };

  // 取得目前語言的翻譯 / Get translation for current language
  function t(key) { return LANG[S.lang][key] ?? LANG.en[key] ?? key; }

  // 套用語言到所有 data-i18n 元素 / Apply language to all data-i18n elements
  function applyLang() {
    document.documentElement.lang = S.lang === 'zh' ? 'zh-TW' : 'en';

    // 更新靜態元素 / Update static elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });

    // 驗證畫面：副標題換行 / Auth subtitle with newline
    const authSub = document.querySelector('#s-auth .subtitle');
    if (authSub) authSub.innerHTML = t('authSubtitle').replace('\n', '<br>');

    // 驗證畫面：scope 提示 / Auth scope note
    $('auth-scope-note').innerHTML = t('authScopeNote');

    // 首頁連結 / Home link
    $('home-link-text').textContent = t('homeLink');

    // 語言按鈕高亮 / Highlight active lang button
    $('lang-en').classList.toggle('active', S.lang === 'en');
    $('lang-zh').classList.toggle('active', S.lang === 'zh');

    // 動態區塊重新渲染 / Re-render dynamic sections
    if (!$('s-main').classList.contains('hidden')) {
      $('grid-label').textContent = t('gridLabel');
      renderQuote();
      renderLifeClock();
      renderCountdown();
      renderStats();
      renderFreeTime();
    }

    ls('dzw_lang', S.lang);
  }

  // 切換語言 / Switch language
  function setLang(lang) {
    S.lang = lang;
    applyLang();
  }

  // ────────────────────────────────────────────────
  // 名言 / Quotes (英文 + 繁體中文)
  // ────────────────────────────────────────────────
  const QUOTES = [
    { en: "It is not that we have a short time to live, but that we waste a great deal of it.",                                            zh: "並非我們的時間太短，而是我們浪費了太多。",                              author: "Seneca" },
    { en: "You could leave life right now. Let that determine what you do and say and think.",                                             zh: "你隨時可能離開人世。讓這一點決定你的所作所為、言語與思想。",            author: "Marcus Aurelius" },
    { en: "Think of yourself as dead. You have lived your life. Now take what's left and live it properly.",                               zh: "把自己想成已死之人。你已活過了你的人生。現在，好好活完剩下的時光。",    author: "Marcus Aurelius" },
    { en: "Begin at once to live, and count each separate day as a separate life.",                                                        zh: "立刻開始生活，把每一天都當作一段獨立的人生。",                          author: "Seneca" },
    { en: "Death smiles at us all; all we can do is smile back.",                                                                          zh: "死亡對我們微笑；我們所能做的，就是回以微笑。",                          author: "Marcus Aurelius" },
    { en: "How long are you going to wait before you demand the best for yourself?",                                                       zh: "你還要等多久，才肯為自己爭取最好的？",                                  author: "Epictetus" },
    { en: "He who fears death will never do anything worthy of a man who is alive.",                                                       zh: "懼怕死亡的人，永遠無法做出值得活著的事。",                              author: "Seneca" },
    { en: "The whole future lies in uncertainty: live immediately.",                                                                       zh: "未來充滿不確定——活在當下。",                                            author: "Seneca" },
    { en: "Do not act as if you had ten thousand years to live.",                                                                          zh: "不要活得好像你還有一萬年可活。",                                        author: "Marcus Aurelius" },
    { en: "The greatest obstacle to living is expectancy, which hangs upon tomorrow and loses today.",                                     zh: "活著最大的障礙是期待，它寄託於明日，卻失去了今天。",                    author: "Seneca" },
    { en: "The trouble is, you think you have time.",                                                                                      zh: "問題在於，你以為自己還有時間。",                                        author: "Buddha 佛陀" },
    { en: "Waste no more time arguing about what a good man should be. Be one.",                                                           zh: "別再浪費時間爭論好人應該是什麼樣子。去成為那樣的人。",                  author: "Marcus Aurelius" },
    { en: "Each day is a little life: every waking and rising a little birth, every going to rest and sleep a little death.",              zh: "每一天都是一段小小的人生：醒來是誕生，入睡是死亡。",                    author: "Arthur Schopenhauer" },
    { en: "In the end, it's not the years in your life that count. It's the life in your years.",                                         zh: "到頭來，重要的不是你活了多少年，而是那些年裡你活得多精彩。",            author: "Abraham Lincoln" },
    { en: "The fear of death follows from the fear of life. A man who lives fully is prepared to die at any time.",                        zh: "對死亡的恐懼，源於對生命的恐懼。活得充實的人，隨時準備好迎接死亡。",    author: "Mark Twain" },
    { en: "We suffer more in imagination than in reality.",                                                                                zh: "我們在想像中受的苦，遠多於現實中。",                                    author: "Seneca" },
    { en: "A day without laughter is a day wasted.",                                                                                      zh: "沒有笑聲的一天，是浪費掉的一天。",                                      author: "Charlie Chaplin" },
    { en: "Life is what happens when you're busy making other plans.",                                                                     zh: "生命，就是你忙著做其他計畫時所發生的事。",                              author: "John Lennon" },
    { en: "Perfection of character is this: to live each day as if it were your last, without frenzy, without apathy, without pretense.", zh: "品格的完美在於：把每一天都當作最後一天來活，不慌亂，不冷漠，不虛偽。", author: "Marcus Aurelius" },
    { en: "It is not death that a man should fear, but he should fear never beginning to live.",                                           zh: "人不應該懼怕死亡，而應該懼怕從未真正開始活過。",                        author: "Marcus Aurelius" },
    { en: "Memento mori — use it not to make you sad, but to make you bold.",                                                             zh: "Memento mori——用它讓自己勇敢，而不是悲傷。",                           author: "Stoic maxim 斯多葛格言" },
    { en: "Time is a river of vanishing moments; its current is swift.",                                                                   zh: "時間是一條消逝瞬間的河流，它的流速迅急。",                              author: "Marcus Aurelius" },
    { en: "You have power over your mind, not outside events. Realize this, and you will find strength.",                                  zh: "你能掌控的是你的心，而非外在事件。認清這一點，你將找到力量。",          author: "Marcus Aurelius" },
    { en: "The impediment to action advances action. What stands in the way becomes the way.",                                             zh: "阻礙行動的，反而推進了行動。擋在路上的，就成了路。",                    author: "Marcus Aurelius" },
    { en: "Dwell on the beauty of life. Watch the stars, and see yourself running with them.",                                             zh: "沉浸在生命的美麗中。仰望星空，看見自己與它們一同奔馳。",                author: "Marcus Aurelius" },
  ];

  // ────────────────────────────────────────────────
  // 應用程式狀態 / App state
  // ────────────────────────────────────────────────
  const S = {
    pat:       null,
    gistId:    null,
    birthdate: null,
    lifespan:  80,
    local:     false,
    sleepHrs:  8,
    workHrs:   8,
    workDays:  5,
    retireAge: 65,
    lang:      'en',   // 'en' | 'zh'
  };

  // ────────────────────────────────────────────────
  // 啟動 / Boot
  // ────────────────────────────────────────────────
  function boot() {
    S.pat    = ls('dzw_pat');
    S.gistId = ls('dzw_gist_id');
    S.local  = ls('dzw_local') === '1';
    S.lang   = ls('dzw_lang') || 'en';

    const saved = ls('dzw_cfg');
    if (saved) {
      const c = JSON.parse(saved);
      S.birthdate = c.b; S.lifespan  = c.l  || 80;
      S.sleepHrs  = c.sh ?? 8; S.workHrs   = c.wh ?? 8;
      S.workDays  = c.wd ?? 5; S.retireAge = c.ra ?? 65;
    }

    applyLang(); // 套用語言 / Apply language before showing any screen

    if (S.birthdate) {
      showMain();
      if (S.pat && S.gistId) pullGist();
    } else if (S.pat || S.local) {
      showSetup();
    } else {
      show('auth');
    }
  }

  // ────────────────────────────────────────────────
  // 畫面切換 / Screen helpers
  // ────────────────────────────────────────────────
  function show(name) {
    ['auth','setup','main'].forEach(n => $('s-'+n).classList.add('hidden'));
    $('s-'+name).classList.remove('hidden');
  }

  function showSetup() {
    show('setup');
    if (S.birthdate) $('bday').value = S.birthdate;
    $('ls').value = S.lifespan;
    $('ls-display').textContent = S.lifespan;
  }

  function showMain() {
    show('main');
    $('grid-label').textContent = t('gridLabel');
    renderAll();
  }

  // ────────────────────────────────────────────────
  // 驗證畫面事件 / Auth events
  // ────────────────────────────────────────────────
  $('connect-btn').onclick = async () => {
    const pat = $('pat').value.trim();
    if (!pat) return;
    $('connect-btn').textContent = t('connectingBtn');
    $('connect-btn').disabled = true;
    $('auth-err').textContent = '';
    try {
      const r = await gh(pat, '/user');
      if (!r.ok) throw new Error(t('invalidToken'));
      S.pat = pat; ls('dzw_pat', pat);

      const gist = await findGist(pat);
      if (gist) {
        S.gistId = gist.id; ls('dzw_gist_id', gist.id);
        applyGist(gist);
        saveLocal();
        showMain();
      } else {
        showSetup();
      }
    } catch(e) {
      $('auth-err').textContent = e.message;
    } finally {
      $('connect-btn').textContent = t('connectBtn');
      $('connect-btn').disabled = false;
    }
  };

  $('skip-btn').onclick = () => { S.local = true; ls('dzw_local','1'); showSetup(); };

  // ────────────────────────────────────────────────
  // 設定畫面事件 / Setup events
  // ────────────────────────────────────────────────
  $('ls').oninput = function() { $('ls-display').textContent = this.value; };

  $('start-btn').onclick = async () => {
    const b = $('bday').value;
    if (!b) { $('setup-err').textContent = t('bdayRequired'); return; }
    S.birthdate = b;
    S.lifespan  = +$('ls').value;
    saveLocal();
    if (S.pat) { setBadge(t('syncing')); await pushGist(); }
    showMain();
  };

  $('settings-btn').onclick = showSetup;

  // ────────────────────────────────────────────────
  // Gist API
  // ────────────────────────────────────────────────
  const API = 'https://api.github.com';
  const GF  = 'die-with-zero-settings.json'; // 保持檔名不變以維持現有同步 / Keep filename for existing sync

  function gh(pat, path, opts={}) {
    return fetch(API + path, {
      ...opts,
      headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
  }

  async function findGist(pat) {
    for (let page = 1; ; page++) {
      const r = await gh(pat, `/gists?per_page=100&page=${page}`);
      if (!r.ok) return null;
      const list = await r.json();
      const hit  = list.find(g => g.files[GF]);
      if (hit) {
        const full = await gh(pat, `/gists/${hit.id}`);
        return full.ok ? full.json() : null;
      }
      if (list.length < 100) return null;
    }
  }

  function applyGist(gist) {
    try {
      const c = JSON.parse(gist.files[GF].content);
      S.birthdate = c.b; S.lifespan  = c.l  || 80;
      S.sleepHrs  = c.sh ?? 8; S.workHrs   = c.wh ?? 8;
      S.workDays  = c.wd ?? 5; S.retireAge = c.ra ?? 65;
    } catch(_) {}
  }

  async function pushGist() {
    const body = {
      description: 'Memento Mori — settings',
      public: false,
      files: { [GF]: { content: JSON.stringify({ b: S.birthdate, l: S.lifespan, sh: S.sleepHrs, wh: S.workHrs, wd: S.workDays, ra: S.retireAge }) } }
    };
    const url    = S.gistId ? `/gists/${S.gistId}` : '/gists';
    const method = S.gistId ? 'PATCH' : 'POST';
    const r = await gh(S.pat, url, { method, body: JSON.stringify(body) });
    if (r.ok) {
      const g = await r.json();
      S.gistId = g.id; ls('dzw_gist_id', g.id);
      setBadge(t('synced'), 'ok');
    } else {
      setBadge(t('syncFailed'), 'err');
    }
  }

  async function pullGist() {
    try {
      setBadge(t('syncing'));
      const r = await gh(S.pat, `/gists/${S.gistId}`);
      if (!r.ok) { setBadge(''); return; }
      const g = await r.json();
      applyGist(g); saveLocal(); renderAll();
      setBadge(t('synced'), 'ok');
    } catch(_) { setBadge(''); }
  }

  // ────────────────────────────────────────────────
  // localStorage 工具 / localStorage helpers
  // ────────────────────────────────────────────────
  function ls(k, v) {
    if (v === undefined) return localStorage.getItem(k);
    if (v === null) localStorage.removeItem(k);
    else localStorage.setItem(k, v);
  }

  function saveLocal() {
    ls('dzw_cfg', JSON.stringify({ b: S.birthdate, l: S.lifespan, sh: S.sleepHrs, wh: S.workHrs, wd: S.workDays, ra: S.retireAge }));
  }

  function setBadge(txt, cls='') {
    const el = $('sync-badge');
    el.textContent = txt;
    el.className = 'sync-badge' + (cls ? ' '+cls : '');
  }

  // ────────────────────────────────────────────────
  // 渲染 / Render
  // ────────────────────────────────────────────────
  function renderAll() {
    renderQuote();
    renderLifeClock();
    renderCountdown();
    renderGrid();
    renderStats();
    renderFreeTime();
  }

  // 每日名言 / Daily quote
  function renderQuote() {
    const now = new Date();
    const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 864e5);
    const q = QUOTES[dayOfYear % QUOTES.length];
    const text   = S.lang === 'zh' ? q.zh : q.en;
    const author = q.author;
    $('daily-quote').innerHTML = `<div class="quote-text">"${text}"</div><div class="quote-author">— ${author}</div>`;
  }

  // 生命時鐘 / Life clock
  function renderLifeClock() {
    const now   = new Date();
    const birth = new Date(S.birthdate);
    const end   = new Date(birth); end.setFullYear(end.getFullYear() + S.lifespan);

    const pct = Math.min(100, Math.max(0, (now - birth) / (end - birth) * 100));

    let age = now.getFullYear() - birth.getFullYear();
    if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;

    const R = 80, cx = 100, cy = 100;
    const circ = 2 * Math.PI * R;
    const lived = pct / 100 * circ;
    const angle = (pct / 100 * 360 - 90) * Math.PI / 180;
    const dx = (cx + R * Math.cos(angle)).toFixed(2);
    const dy = (cy + R * Math.sin(angle)).toFixed(2);

    $('life-clock').innerHTML = `
      <svg viewBox="0 0 200 200" width="200" height="200">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1a1a1a" stroke-width="12"/>
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#2e2e2e" stroke-width="12"
          stroke-dasharray="${lived.toFixed(2)} ${circ.toFixed(2)}"
          transform="rotate(-90 ${cx} ${cy})"/>
        <circle cx="${dx}" cy="${dy}" r="7" fill="#c8a96e"/>
        <circle cx="${dx}" cy="${dy}" r="13" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
        <text x="${cx}" y="${cy - 6}"  text-anchor="middle" fill="#e8e8e8" font-size="34" font-weight="200" font-family="-apple-system,sans-serif">${age}</text>
        <text x="${cx}" y="${cy + 13}" text-anchor="middle" fill="#555"    font-size="10" font-family="-apple-system,sans-serif" letter-spacing="2">${t('yearsOld')}</text>
        <text x="${cx}" y="${cy + 32}" text-anchor="middle" fill="#c8a96e" font-size="11" font-family="-apple-system,sans-serif">${pct.toFixed(1)}${t('pctLived')}</text>
      </svg>`;
  }

  // 倒數計時 / Countdown
  function renderCountdown() {
    const now   = new Date();
    const birth = new Date(S.birthdate);
    const end   = new Date(birth); end.setFullYear(end.getFullYear() + S.lifespan);
    const msLeft = end - now;

    if (msLeft <= 0) {
      $('countdown').innerHTML = `<div class="cd-unit"><div class="cd-val" style="font-size:1.2rem">${t('giftMsg')}</div></div>`;
      return;
    }

    const totalDays = msLeft / 864e5;
    const yrs  = Math.floor(totalDays / 365.25);
    const mos  = Math.floor((totalDays % 365.25) / 30.44);
    const wks  = Math.floor((totalDays % 30.44) / 7);
    const days = Math.floor(totalDays % 7);

    $('countdown').innerHTML = [
      [yrs,  t('cdYears')],
      [mos,  t('cdMonths')],
      [wks,  t('cdWeeks')],
      [days, t('cdDays')]
    ].map(([v, l]) => `
      <div class="cd-unit">
        <div class="cd-val">${v.toLocaleString()}</div>
        <div class="cd-label">${l}</div>
      </div>`).join('');
  }

  // 人生週曆 / Life-in-weeks grid
  function renderGrid() {
    const birth = new Date(S.birthdate);
    const now   = new Date();
    const weeksLived = Math.floor((now - birth) / 6048e5);
    const grid = $('life-grid');
    grid.innerHTML = '';

    for (let y = 0; y < S.lifespan; y++) {
      const row = document.createElement('div');
      row.className = 'grid-row';

      const lbl = document.createElement('div');
      lbl.className = 'yr-lbl';
      if (y % 5 === 0) lbl.textContent = y;
      row.appendChild(lbl);

      for (let w = 0; w < 52; w++) {
        const idx = y * 52 + w;
        const box = document.createElement('div');
        box.className = 'wk ' + (idx < weeksLived ? 'past' : idx === weeksLived ? 'now' : 'future');
        box.title = S.lang === 'zh' ? `${y} 歲，第 ${w + 1} 週` : `Age ${y}, week ${w + 1}`;
        row.appendChild(box);
      }
      grid.appendChild(row);
    }
  }

  // 統計卡片 / Stats
  function renderStats() {
    const now   = new Date();
    const birth = new Date(S.birthdate);
    const end   = new Date(birth); end.setFullYear(end.getFullYear() + S.lifespan);
    const msLeft   = Math.max(0, end - now);
    const daysLeft = msLeft / 864e5;
    const pct      = Math.min(100, (now - birth) / (end - birth) * 100);
    const fmt = n => Math.floor(n).toLocaleString();

    $('stats').innerHTML = [
      [pct.toFixed(1) + '%',       t('statLifeLived')],
      [fmt(daysLeft / 365.25),     t('statSummers')],
      [fmt(daysLeft / 7),          t('statWeekends')],
      [fmt(daysLeft / 29.53),      t('statMoons')],
      [fmt(daysLeft),              t('statDays')],
      [fmt(daysLeft * 24),         t('statHours')],
    ].map(([v, l]) => `
      <div class="stat">
        <div class="stat-val">${v}</div>
        <div class="stat-lbl">${l}</div>
      </div>`).join('');
  }

  // 自由時間 / Free time
  function renderFreeTime() {
    const now   = new Date();
    const birth = new Date(S.birthdate);
    const end   = new Date(birth); end.setFullYear(end.getFullYear() + S.lifespan);
    const daysLeft = Math.max(0, (end - now) / 864e5);

    const retire = new Date(birth); retire.setFullYear(retire.getFullYear() + S.retireAge);
    const workDaysLeft = Math.max(0, (Math.min(retire, end) - now) / 864e5) * (S.workDays / 7);

    const totalHrs = daysLeft * 24;
    const sleepHrs = daysLeft * S.sleepHrs;
    const workHrs  = workDaysLeft * S.workHrs;
    const freeHrs  = Math.max(0, totalHrs - sleepHrs - workHrs);
    const freeYrs  = freeHrs / (365.25 * 24);
    const freePct  = totalHrs > 0 ? (freeHrs / totalHrs * 100) : 0;
    const fmt = n => Math.floor(n).toLocaleString();

    $('ft-stats').innerHTML = [
      [fmt(freeHrs),               t('ftFreeHours')],
      [fmt(freeYrs),               t('ftFreeYears')],
      [freePct.toFixed(1) + '%',   t('ftFreePct')],
      [fmt(freeHrs / 24 / 7),      t('ftFreeWeekends')],
    ].map(([v, l]) => `
      <div class="stat">
        <div class="stat-val">${v}</div>
        <div class="stat-lbl">${l}</div>
      </div>`).join('');

    $('ft-sleep').value  = S.sleepHrs;
    $('ft-work').value   = S.workHrs;
    $('ft-wdays').value  = S.workDays;
    $('ft-retire').value = S.retireAge;
  }

  // ────────────────────────────────────────────────
  // 自由時間輸入事件 / Free time input events
  // ────────────────────────────────────────────────
  function ftChanged() {
    S.sleepHrs  = Math.max(4,  Math.min(12, +$('ft-sleep').value  || 8));
    S.workHrs   = Math.max(0,  Math.min(16, +$('ft-work').value   || 8));
    S.workDays  = Math.max(0,  Math.min(7,  +$('ft-wdays').value  || 5));
    S.retireAge = Math.max(40, Math.min(90, +$('ft-retire').value || 65));
    renderFreeTime();
    saveLocal();
    if (S.pat) pushGist();
  }
  ['ft-sleep','ft-work','ft-wdays','ft-retire'].forEach(id => $(id).addEventListener('change', ftChanged));

  // ────────────────────────────────────────────────
  // 每秒更新 / Live tick
  // ────────────────────────────────────────────────
  setInterval(() => {
    if (!$('s-main').classList.contains('hidden')) { renderLifeClock(); renderCountdown(); }
  }, 1000);

  boot();
</script>
</body>
</html>
